<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Night Drive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Space Mono', monospace;
    }
    
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    #cabin-overlay {
      pointer-events: none;
      z-index: 100;
    }

    #ui-layer {
      pointer-events: none;
      z-index: 110;
    }

    /* UI Overlay System */
    #overlay-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      width: 90%;
      max-width: 400px;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .ui-message {
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #eee;
      padding: 12px 32px 12px 16px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      pointer-events: auto;
      position: relative;
      opacity: 0;
      transition: opacity 1s ease, transform 1s ease;
      transform: translateY(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
    }

    .ui-message.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ui-message a {
      color: #4da6ff;
      text-decoration: none;
      border-bottom: 1px solid rgba(77, 166, 255, 0.3);
    }

    .ui-message a:hover {
      color: #80bfff;
      border-bottom-color: #80bfff;
    }

    .ui-message-close {
      position: absolute;
      top: 4px;
      right: 8px;
      cursor: pointer;
      color: #666;
      font-size: 14px;
      padding: 4px;
      user-select: none;
    }

    .ui-message-close:hover {
      color: #fff;
    }

    #weather-layer {
      pointer-events: none;
      z-index: 105;
    }

    /* Dev Menu Styles */
    #dev-menu-container {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      pointer-events: none;
    }

    #dev-toggle {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #444;
      color: #0f0;
      padding: 5px 10px;
      cursor: pointer;
      pointer-events: auto;
      margin-bottom: 5px;
      border-radius: 4px;
    }

    #dev-panel {
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #444;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      width: 220px;
      pointer-events: auto;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    #dev-panel.active {
      display: flex;
    }

    .dev-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dev-row label {
      flex: 1;
    }

    .dev-row input[type="range"] {
      flex: 1.5;
      height: 4px;
      background: #444;
      outline: none;
    }

    .dev-row select, .dev-row button {
      background: #222;
      color: #fff;
      border: 1px solid #555;
      font-family: inherit;
      font-size: 10px;
      padding: 2px 4px;
    }

    .dev-stats {
      border-top: 1px solid #333;
      padding-top: 5px;
      margin-top: 5px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="sky-layer"></canvas>
    <canvas id="road-layer"></canvas>
    <canvas id="environment-layer"></canvas>
    <canvas id="traffic-layer"></canvas>
    <canvas id="weather-layer"></canvas>
    <canvas id="windshield-layer"></canvas>
    <canvas id="ui-layer"></canvas>
    <div id="overlay-container"></div>
    <img id="cabin-overlay" src="/car_cabin_overlay.png" alt="">
    
    <div id="dev-menu-container">
      <button id="dev-toggle">DEV TOOLS</button>
      <div id="dev-panel">
        <div class="dev-row">
          <label>Time</label>
          <input type="range" id="dev-time" min="0" max="1" step="0.01">
        </div>
        <div class="dev-row">
          <label>Speed</label>
          <input type="range" id="dev-speed" min="0" max="100" step="1">
        </div>
        <div class="dev-row">
          <label>Rain</label>
          <input type="range" id="dev-rain" min="0" max="1" step="0.01">
        </div>
        <div class="dev-row">
          <label>Fog</label>
          <input type="range" id="dev-fog" min="0" max="1" step="0.01">
        </div>
        <div class="dev-row">
          <label>Clouds</label>
          <input type="range" id="dev-clouds" min="0" max="1" step="0.01">
        </div>
        <div class="dev-row">
          <label>Location</label>
          <select id="dev-location">
            <option value="city">City</option>
            <option value="suburbs">Suburbs</option>
            <option value="plains">Plains</option>
            <option value="forest">Forest</option>
          </select>
        </div>
        <div class="dev-row">
          <label>Traffic</label>
          <input type="range" id="dev-traffic" min="0" max="5" step="0.1">
        </div>
        <div class="dev-row">
          <label>Debug View</label>
          <input type="checkbox" id="dev-debug-view">
        </div>
        <div class="dev-stats" id="dev-stats">
          FPS: 00 | Pos: 0.00
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="./main.js"></script>

</body>
</html>
