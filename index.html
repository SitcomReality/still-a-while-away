<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Night Drive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Space Mono', monospace;
    }
    
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    #cabin-overlay {
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="sky-layer"></canvas>
    <canvas id="environment-layer"></canvas>
    <canvas id="road-layer"></canvas>
    <canvas id="traffic-layer"></canvas>
    <canvas id="weather-layer"></canvas>
    <canvas id="windshield-layer"></canvas>
    <img id="cabin-overlay" src="/car_cabin_overlay.png" alt="">
  </div>
  
  <script type="module" src="./main.js"></script>

</html>
